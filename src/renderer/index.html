<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <title>Hermes Desktop for Office</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div class="app-titlebar">
      <div class="titlebar-brand">
        <div id="logo">⚡</div>
        <div id="logo-text">Hermes</div>
      </div>
      <div class="titlebar-status">
        <span class="status-indicator"><span class="status-dot" id="status-agent-dot"></span><span class="status-text" id="status-agent">Agent</span></span>
        <span class="status-indicator"><span class="status-dot" id="status-feishu-dot"></span><span class="status-text" id="status-feishu">飞书</span></span>
        <span class="status-indicator"><span class="status-dot" id="status-dingtalk-dot"></span><span class="status-text" id="status-dingtalk">钉钉</span></span>
      </div>
    </div>

    <div class="layout-container">
      <div class="rail">
        <button class="rail-btn active" data-page="settings" title="配置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button class="rail-btn" data-page="auth" title="授权">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
        </button>
        <button class="rail-btn" data-page="chat" title="对话">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button class="rail-btn" data-page="logs" title="日志">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
        </button>
      </div>

      <div class="sidebar">
        <div class="sidebar-panel active" data-panel="settings">
          <div class="sidebar-section">
            <div class="sidebar-section-title">配置菜单</div>
            <div class="sidebar-menu-item active" data-card="0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>API 配置</span></div>
            <div class="sidebar-menu-item" data-card="1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span>工作区设置</span></div>
            <div class="sidebar-menu-item" data-card="2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span>通用设置</span></div>
          </div>
        </div>
        <div class="sidebar-panel" data-panel="auth">
          <div class="sidebar-section">
            <div class="sidebar-section-title">授权状态</div>
            <div class="sidebar-card">
              <div class="sidebar-card-title">飞书</div>
              <div class="sidebar-card-status"><span class="status-dot" id="feishu-sidebar-dot"></span><span id="feishu-sidebar-status">未授权</span></div>
            </div>
            <div class="sidebar-card">
              <div class="sidebar-card-title">钉钉</div>
              <div class="sidebar-card-status"><span class="status-dot" id="dingtalk-sidebar-dot"></span><span id="dingtalk-sidebar-status">未授权</span></div>
            </div>
          </div>
        </div>
        <div class="sidebar-panel" data-panel="chat">
          <div class="sidebar-section">
            <div class="sidebar-section-title">会话列表</div>
            <button class="new-chat-btn" id="new-chat-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span>新建对话</span>
            </button>
            <div class="sidebar-empty">暂无会话</div>
          </div>
        </div>
        <div class="sidebar-panel" data-panel="logs">
          <div class="sidebar-section">
            <div class="sidebar-section-title">日志筛选</div>
            <div class="sidebar-empty">无筛选选项</div>
          </div>
        </div>
      </div>

      <div class="main">
        <div class="page active" id="page-settings">
          <div class="page-header">
            <h2>配置</h2>
          </div>
          <div class="card">
            <h3>API 配置</h3>
            <div class="form-group">
              <label for="gateway-url">Gateway URL</label>
              <input type="text" id="gateway-url" placeholder="https://your-gateway-url">
            </div>
            <div class="form-group">
              <label for="api-token">API Token</label>
              <div class="input-with-action">
                <input type="password" id="api-token" placeholder="输入你的 API Token">
                <button id="toggle-token" class="btn-icon" title="显示/隐藏">👁</button>
              </div>
            </div>
            <div class="form-actions">
              <button id="test-connection" class="btn btn-secondary">测试连接</button>
              <button id="save-config" class="btn btn-primary">保存配置</button>
            </div>
          </div>
          <div class="card">
            <h3>工作区设置</h3>
            <div class="form-group">
              <label for="workspace-path">工作空间路径</label>
              <div class="input-with-action">
                <input type="text" id="workspace-path" placeholder="~/.hermes" readonly>
                <button id="browse-folder" class="btn btn-secondary">浏览</button>
              </div>
            </div>
          </div>
          <div class="card">
            <h3>通用设置</h3>
            <div class="form-group">
              <label class="toggle-label">
                <input type="checkbox" id="auto-start">
                <span class="toggle-slider"></span>
                <span class="toggle-text">开机自动启动 Agent</span>
              </label>
            </div>
          </div>
        </div>

        <div class="page" id="page-auth">
          <div class="page-header">
            <h2>CLI 授权</h2>
          </div>
          <div class="card">
            <h3>飞书授权</h3>
            <div class="auth-info">
              <div class="auth-meta">
                <span class="auth-label">版本:</span>
                <span class="auth-value" id="feishu-version">-</span>
              </div>
              <div class="auth-meta">
                <span class="auth-label">状态:</span>
                <span id="feishu-status"><span class="status-badge unauth">未授权</span></span>
              </div>
              <div class="auth-meta" id="feishu-user-row" style="display:none">
                <span class="auth-label">用户:</span>
                <span class="auth-value" id="feishu-user">-</span>
              </div>
            </div>
            <div class="form-actions">
              <button id="auth-feishu" class="btn btn-primary">开始授权</button>
              <button id="reauth-feishu" class="btn btn-secondary" style="display:none">重新授权</button>
            </div>
          </div>
          <div class="card">
            <h3>钉钉授权</h3>
            <div class="auth-info">
              <div class="auth-meta">
                <span class="auth-label">版本:</span>
                <span class="auth-value" id="dingtalk-version">-</span>
              </div>
              <div class="auth-meta">
                <span class="auth-label">状态:</span>
                <span id="dingtalk-status"><span class="status-badge unauth">未授权</span></span>
              </div>
              <div class="auth-meta" id="dingtalk-user-row" style="display:none">
                <span class="auth-label">用户:</span>
                <span class="auth-value" id="dingtalk-user">-</span>
              </div>
            </div>
            <div class="form-actions">
              <button id="auth-dingtalk" class="btn btn-primary">开始授权</button>
              <button id="reauth-dingtalk" class="btn btn-secondary" style="display:none">重新授权</button>
            </div>
          </div>
          <div class="card">
            <h3>一键诊断</h3>
            <button id="run-diagnostic" class="btn btn-secondary">运行诊断</button>
            <div id="diagnostic-result" class="result-box" style="display:none"></div>
          </div>
        </div>

        <div class="page" id="page-chat">
          <div class="page-header">
            <h2>对话</h2>
          </div>
          <div class="chat-container">
            <div id="chat-messages" class="chat-messages">
              <div class="message agent">
                <div class="message-bubble">你好！我是 Hermes，有什么可以帮你？</div>
              </div>
            </div>
            <div class="chat-input-area">
              <textarea id="chat-input" placeholder="输入消息，Shift+Enter 换行..." rows="2"></textarea>
              <button id="send-message" class="btn btn-primary">发送</button>
            </div>
          </div>
        </div>

        <div class="page" id="page-logs">
          <div class="page-header">
            <h2>运行日志</h2>
          </div>
          <div class="log-controls">
            <button id="agent-start" class="btn btn-secondary">启动 Agent</button>
            <button id="agent-stop" class="btn btn-secondary">停止 Agent</button>
            <button id="agent-restart" class="btn btn-secondary">重启 Agent</button>
            <button id="clear-logs" class="btn btn-secondary" style="margin-left:auto">清空日志</button>
          </div>
          <div id="log-viewer" class="log-viewer"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
